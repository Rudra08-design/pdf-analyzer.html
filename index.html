<!DOCTYPE html>
<html>
<head>
<title>PDF Analyzer 💀</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

textarea {
    width: 80%;
    height: 200px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>📄 Smart PDF Analyzer</h1>

<input type="file" id="upload">
<br><br>

<select id="exam">
<option>NEET</option>
<option>JEE Mains</option>
<option>JEE Advanced</option>
<option>WBJEE</option>
</select>

<button onclick="analyze()">Analyze</button>

<div class="card">
<h3>Extracted Text</h3>
<textarea id="output"></textarea>
</div>

<div class="card">
<h3>📊 Analysis</h3>
<p id="result"></p>
</div>

<script>
let textData = "";

document.getElementById('upload').addEventListener('change', function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function() {
        let typedarray = new Uint8Array(this.result);

        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
            let pages = [];

            for(let i=1;i<=pdf.numPages;i++){
                pages.push(
                    pdf.getPage(i).then(page=>{
                        return page.getTextContent().then(text=>{
                            return text.items.map(s=>s.str).join(" ");
                        });
                    })
                );
            }

            Promise.all(pages).then(content=>{
                textData = content.join(" ");
                document.getElementById("output").value = textData;
            });
        });
    };

    reader.readAsArrayBuffer(file);
});

function analyze(){
    let exam = document.getElementById("exam").value;

    let score = 0;

    if(textData.includes("numerical")) score += 2;
    if(textData.includes("derivation")) score += 3;
    if(textData.includes("formula")) score += 2;
    if(textData.includes("diagram")) score += 1;

    let level = "";

    if(score > 5) level = "🔥 HIGH IMPORTANCE";
    else if(score > 2) level = "⚡ MEDIUM IMPORTANCE";
    else level = "🟢 LOW IMPORTANCE";

    document.getElementById("result").innerText =
    `Exam: ${exam} \nImportance: ${level}`;
}
</script>

</body>
</html>
